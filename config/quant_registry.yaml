#
# Consomme par:
#   - core/governance/promotion_gate.py (paper_start_at + wf_manifest_path)
#   - scripts/runtime_audit.py (status_runtime)
#   - dashboard/api/routes_v2.py (status calcule)
#
# Regles:
#   - PAS de notes libres ici. Si tu veux documenter, ecris dans docs/strategies/.
#   - paper_start_at: date YYYY-MM-DD OBLIGATOIRE pour toute strat paper_only.
#   - wf_manifest_path: chemin vers data/research/wf_manifests/*.json.
#     Si fichier manquant -> promotion_gate BLOCK (strict).
#   - grade: S | A | B | REJECTED (calcule par core.research.wf_canonical).
#     Si REJECTED -> strat doit etre archivee dans les 7 jours.
# =============================================================================

