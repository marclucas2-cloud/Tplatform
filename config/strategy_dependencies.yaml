# --- CRYPTO STRATEGIES (Binance France) ---

STRAT-001_btc_eth_dual_momentum:
  data_source: binance_api_get_prices(BTCUSDC, 4h, 100) + binance_api_get_prices(ETHUSDC, 4h, 100)
  signal_conditions: EMA20 > EMA50 AND momentum positive on BTC or ETH
  execution_type: margin_long_or_short
  broker_flow: ensure_margin_collateral -> margin_borrow -> create_position(margin)
  cash_deps: [USDC in spot OR earn_flexible]
  margin_deps: [BTCUSDC isolated margin enabled, ETHUSDC isolated margin enabled]
  min_notional: 5
  lot_size_step:
    BTC: 0.00001
    ETH: 0.0001
  regime_multiplier_key: btc_eth_trend
  allocation_pct: 0.20
  timeframe: 4h

STRAT-004_vol_breakout:
