  cash_deps: [USDC in spot OR earn_flexible]
  margin_deps: [BTCUSDC/ETHUSDC/SOLUSDC isolated margin enabled]
  min_notional: 5
  lot_size_step:
    BTC: 0.00001
    ETH: 0.0001
    SOL: 0.01
  regime_multiplier_key: vol_regime
  allocation_pct: 0.10
  timeframe: 4h

STRAT-005_btc_dominance_v2:
