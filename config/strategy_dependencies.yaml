# --- FX STRATEGIES (IBKR) ---

fx_carry_momentum_filter:
  data_source: ibkr_reqHistoricalData(AUDJPY/USDJPY/EURJPY/NZDUSD, 1D, 90D)
  signal_conditions: carry spread positive + momentum 63d positive
  execution_type: ibkr_forex
  broker_flow: IBKRBroker(client_id=10) -> get_positions -> reconcile -> create_position(forex)
  cash_deps: [IBKR equity > $5K]
  margin_deps: [IB Gateway port 4002 connected]
  min_notional: 1000
  lot_size_step: N/A (forex = notional)
  regime_multiplier_key: fx_carry_momentum
  allocation_pct: varies_by_pair
  timeframe: 1d
  data_parquets:
    - data/fx/AUDJPY_1D.parquet
    - data/fx/USDJPY_1D.parquet
    - data/fx/EURJPY_1D.parquet
    - data/fx/NZDUSD_1D.parquet
  ibkr_client_id: 10
  max_notional_per_pair: 40000
