# =============================================================================
# STRATEGIES REGISTRY CANONIQUE — fiche par strategie
# =============================================================================
# Phase 1.2 du plan TODO XXL DESK PERSO 10/10.
#
# Une fiche canonique par strategie avec:
#   - strategy_id, book_id, owner
#   - status (research, paper, candidate_live, live, disabled, retired)
#   - thesis, instrument_universe, signal_frequency, holding_period
#   - required_data, cost_model, slippage_model, capacity_notes
#   - risk_limits (-> risk_registry.yaml)
#   - capital_usage_profile, correlation_notes
#   - promotion_evidence_refs (chemin vers backtest, WF, MC, scorecards)
#   - demotion_conditions
#
# Ce registre est la SOURCE DE VERITE pour tout reasoning sur les strats.
# live_whitelist.yaml reste le contract d'autorisation, ce registre est
# la documentation operationnelle.
# =============================================================================

metadata:
  version: 1
  updated_at: "2026-04-16"
  notes: "v1 initial Phase 1.2. Consolide live_whitelist + docs strategies."

# -----------------------------------------------------------------------------
# IBKR FUTURES (6 strats)
# -----------------------------------------------------------------------------

strategies:

  cross_asset_momentum:
    book_id: ibkr_futures
    owner: marc
    status: live
    thesis: |
      Cross-asset momentum (Moskowitz-Ooi-Pedersen 2012): assets avec returns
      positifs recents continuent de surperformer 1-12 mois. Applique sur 5
      micro futures (MES, MNQ, M2K, MGC, MCL) diversifiant equity/gold/oil.
    instrument_universe: [MES, MNQ, M2K, MGC, MCL]
    signal_frequency: daily
    holding_period: 20d
    required_data: [MES_LONG.parquet, MNQ_LONG.parquet, M2K_LONG.parquet, MGC_LONG.parquet, MCL_LONG.parquet]
    cost_model: "IBKR $0.85/side + 2 ticks slippage"
    slippage_model: "2 ticks per side (cf docs/research/cost_capacity_assumptions.md)"
    capacity_notes: "ADV MES 1M contracts, 1% = 10K = $220M. Cap perso 10 contracts."
    risk_limits_ref: "config/risk_registry.yaml#strategies.cross_asset_momentum"
    capital_usage_profile: "rotation 1 contract (MES/MNQ/M2K/MGC/MCL), 1 trade actif a la fois"
    correlation_notes: "corr to MES 0.003, ALPHA pur sur 5Y daily"
    promotion_evidence_refs:
      - "scripts/wf_ib_portfolio.py"
      - "ib_portfolio_wf_v2.csv (5/5 OOS profitable)"
      - "data/research/portfolio_baseline_timeseries.parquet"
    demotion_conditions:
      - "5 consecutive losses"
      - "rolling 90d Sharpe < -0.5"
      - "drawdown_rolling_90d > -8%"
    notes: |
      First-refusal sur ses symboles preferes (cf worker.py ligne 1721).
      Bloque les autres strats qui voudraient prendre le meme symbol.
      Audit ChatGPT: ib_portfolio_wf_v2.csv montre 1 fenetre OOS a -20.5% CAGR
      -> verdict ⚠️ "a ameliorer" mais reste live (dominante portfolio).

  gold_trend_mgc:
    book_id: ibkr_futures
    owner: marc
    status: paper        # 2026-04-16 downgrade live_core -> paper_only V1 recalibration
    thesis: |
      Gold trend follow MGC. Long si close > EMA20. Capture rallies gold
      independants des equities (flight-to-quality + inflation expectations).
      Positive EVERY year 2021-2026 incl bears.
    instrument_universe: [MGC]
    signal_frequency: daily
    holding_period: 10d (max)
    required_data: [MGC_LONG.parquet]
    cost_model: "IBKR $0.85/side + 2 ticks slippage"
    slippage_model: "2 ticks per side"
    capacity_notes: "ADV MGC 50K contracts, 1% = 500 = $20M. Cap perso 3 contracts."
    risk_limits_ref: "config/risk_registry.yaml#strategies.gold_trend_mgc"
    capital_usage_profile: "1 contract MGC long-only intermittent"
    correlation_notes: "corr to MES -0.02 (alpha pur), corr to gold_oil 0.10"
    promotion_evidence_refs:
      - "scripts/research/backtest_gold_trend_sl_variants.py (V1 SL 0.4% TP 0.8%)"
      - "scripts/research/wf_mc_gold_trend_v1.py (5/5 OOS, MC P(DD>30%)=0%)"
      - "docs/research/gold_trend_sl_recalibration.md"
    demotion_conditions:
      - "5 consecutive losses"
      - "rolling 90d Sharpe < -0.5"
    notes: |
      V0 (1.5%/3%) etouffe par deleveraging level_3 -1.8% NAV en prod.
      V1 (0.4%/0.8%) recalibre, validated WF+MC, en paper 30j avant retour live.

  gold_oil_rotation:
    book_id: ibkr_futures
    owner: marc
    status: live
    thesis: |
      Long le winner entre MGC/MCL selon spread momentum 20d. Pas market neutral
      (long le gagnant absolu), mais utile car capture rotation commodity.
    instrument_universe: [MGC, MCL]
    signal_frequency: daily
    holding_period: 20d
    required_data: [MGC_LONG.parquet, MCL_LONG.parquet]
    cost_model: "IBKR $0.85/side + 2 ticks slippage"
    slippage_model: "2 ticks per side"
    capacity_notes: "Cap perso 3 contracts MGC ou 5 MCL"
    risk_limits_ref: "config/risk_registry.yaml#strategies.gold_oil_rotation"
    capital_usage_profile: "1 contract MGC OR MCL, rotation"
    correlation_notes: "corr to cross_asset 0.002, corr to gold_trend 0.10, corr MES 0.02"
    promotion_evidence_refs:
      - "scripts/wf_gold_oil_rotation.py (5/5 OOS profitable, mean Sharpe 7.16)"
      - "Backtest 5Y +$X positive every year incl 2022/2026 bears"
    demotion_conditions:
      - "5 consecutive losses"
      - "rolling 90d Sharpe < -0.5"
    notes: |
      Audit ChatGPT: pas market neutral (long le gagnant), juste rotation.
      Verdict ⚠️ "a ameliorer" mais reste live (alpha confirme).

  mes_monday_long_oc:
    book_id: ibkr_futures
    owner: marc
    status: paper
    thesis: |
      Long MES open-to-close chaque lundi. Edge calendaire documente.
