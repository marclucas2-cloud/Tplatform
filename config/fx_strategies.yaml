# =============================================================================
# Spread filter — seuils max par paire (rejet si spread > max_spread_ratio x moyenne)
# =============================================================================
spread_filter:
  max_spread_ratio: 2.0
  average_spreads_bps:
    EURUSD: 0.8
    EURGBP: 1.2
    EURJPY: 1.5
    AUDJPY: 2.0
    GBPUSD: 1.0
    USDCHF: 1.5
    NZDUSD: 2.5
    USDJPY: 0.9
    AUDUSD: 1.5
    NZDJPY: 3.0
    CADJPY: 2.5
    NOKJPY: 5.0
    SEKJPY: 5.0

# =============================================================================
# Cout IBKR FX : $2 par trade + spread (inclus dans backtest)
# =============================================================================
cost_model:
  commission_per_trade_usd: 2.0
  min_commission_usd: 2.0
  slippage_bps_default: 0.8
