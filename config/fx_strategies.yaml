# =============================================================================
# FX Strategies Registry — config/fx_strategies.yaml
#
# Registre complet des strategies FX : 12 existantes + 3 nouvelles = 15.
# Chaque strategie reference le module Python dans strategies_v2/fx/.
# Les nouvelles sont desactivees (paper first, WF requis).
#
# Champs obligatoires :
#   name, enabled, module, pairs, edge_type, sharpe, trades, wf_status,
#   allocation_pct, max_position_pct, sl_pct, tp_pct
#
# Champs optionnels :
#   swap_daily_bps — estimation du swap journalier (+ = gain, - = cout)
#   ibkr_symbol — mapping pair -> symbole IBKR
#   min_order_size — taille minimum en devise de base
#   signal_frequency — frequence d'evaluation (1H, 4H, daily)
# =============================================================================

