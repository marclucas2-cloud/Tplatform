# Limites de risque LIVE - IBKR
# Derniere mise a jour : 2026-04-30 (post ajout capital +$15K)
#
# IMPORTANT : `capital` ci-dessous n'est qu'une valeur de bootstrap.
# En runtime, worker.py:2024 appelle risk_mgr.update_capital(equity_live)
# a chaque cycle live, qui ecrase cette valeur avec le NAV IBKR reel
# (cf core/risk_manager_live.py). Modifier cette valeur n'a donc
# d'effet QUE pendant la fenetre tres courte entre boot du worker et
# premier cycle live. Ne pas se reposer dessus pour calibrer le sizing.
#
# Note historique : la plateforme est passee d'un compte equity $10K
# (mars 2026) a un compte futures finance a $25.5K de depots historiques
# (500 + 10,000 + 15,000). Les sections `position_limits`, `sector_limits`
# et `fx_limits` ci-dessous datent de l'ere equity et ne sont PAS lues par
# le runtime futures actuel pour le risk budget per-strategy.

capital: 25500  # bootstrap only, override par update_capital() au 1er cycle
mode: LIVE

position_limits:
  max_position_pct: 0.20          # ~$5,100 max par position
  max_strategy_pct: 0.30          # ~$7,650 max par strategie
  max_long_pct: 0.70              # ~$17,850 max long
  max_short_pct: 0.40             # ~$10,200 max short
  max_gross_pct: 1.30             # ~$33,150 max gross
  max_positions: 12               # Max 12 positions
  min_cash_pct: 0.05              # ~$1,275 min cash

margin_limits:
  max_margin_used_pct: 0.70       # Alerte
  block_margin_pct: 0.85          # Block new trades

circuit_breakers:
  daily_loss_pct: 0.05            # -$1,275 -> stop trading today
  hourly_loss_pct: 0.03           # -$765 -> pause 30 min
  weekly_loss_pct: 0.08           # -$2,040 -> reduce sizing 50%

kill_switch:
  trailing_5d_loss_pct: 0.08      # -$2,040 sur 5j -> tout fermer
  max_monthly_loss_pct: 0.12      # -$3,060 sur le mois -> tout fermer, review

deleveraging:
  level_1_dd_pct: 0.025           # -$638 -> reduce 30%
  level_1_action: 0.30
  level_2_dd_pct: 0.04            # -$1,020 -> reduce 50%
  level_2_action: 0.50
  level_3_dd_pct: 0.06            # -$1,530 -> close all
  level_3_action: 1.00

sector_limits:
  max_sector_pct: 0.30
  max_fx_pair_pct: 0.25
  max_futures_instrument_pct: 0.25

# FX-specific limits
fx_limits:
  max_fx_notional_pct: 15.0         # ~$382.5K notional max (15x capital)
  max_fx_margin_pct: 0.40           # ~$10,200 margin FX max
  max_single_pair_notional: 40000   # $40K max per pair
  max_single_pair_margin_pct: 0.15  # ~$3,825 margin max per pair

# Futures-specific limits
futures_limits:
  max_futures_margin_pct: 0.35      # ~$8,925 margin futures max
  max_single_contract_margin_pct: 0.20  # ~$5,100 max par contract type
  allowed_contracts: [MCL, MES, MNQ, MGC, FIB, FESX]
  max_contracts_per_symbol: 2

# Combined limits
combined_limits:
  max_total_margin_pct: 0.80        # Total margin (equity+FX+futures) < 80%
  min_cash_pct: 0.10                # ~$2,550 combined cash free

# Same sector map as paper
sector_map:
  tech: [AAPL, MSFT, NVDA, AMD, AVGO]
  finance: [JPM, BAC, WFC, GS]
  energy: [XOM, CVX, COP, XLE, USO]
  crypto: [COIN, MARA, MSTR]
  futures_index: [MES, MNQ]
  futures_energy: [MCL]
  futures_metals: [MGC]
  fx_eur: [EUR.USD, EUR.GBP, EUR.JPY, EURUSD, EURGBP, EURJPY]
  fx_commodity: [AUD.JPY, GBP.USD, AUDJPY, GBPUSD]
