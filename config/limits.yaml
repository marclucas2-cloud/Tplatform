  futures_index: [MES, MNQ]
  futures_energy: [MCL]
  futures_metals: [MGC]

futures_limits:
  max_total_margin_pct: 0.30
  max_single_contract_margin_pct: 0.10
  max_contracts_per_symbol: 5
  margin_alert_yellow: 0.50
  margin_alert_red: 0.70

fx_limits:
  max_single_pair_exposure: 0.25
  max_total_fx_exposure: 0.60
  max_fx_leverage: 5.0  # Conservative for $25K

cross_asset_limits:
  max_correlated_exposure: 0.35  # Corr > 0.7 positions
  max_single_broker: 0.60
  max_single_timezone: 0.50
