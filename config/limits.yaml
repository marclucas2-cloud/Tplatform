# Limites de risque V5 — Multi-Asset Expansion
# Derniere mise a jour : 2026-03-27

position_limits:
  max_single_position: 0.10
  max_single_strategy: 0.15
  max_sector_exposure: 0.25
  max_single_broker: 0.60

exposure_limits:
  max_long_net: 0.60
  max_short_net: 0.30
  max_gross: 0.90
  min_cash: 0.07

risk_limits:
  max_var_95_daily: 0.02
  max_var_99_daily: 0.03
  max_correlation_pair: 0.60
  circuit_breaker_daily_dd: 0.05
