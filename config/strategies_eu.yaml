# =============================================================================
# EU Strategies Registry — config/strategies_eu.yaml
#
# Chaque strategie EU validee walk-forward est declaree ici.
# Le pipeline live_portfolio_eu.py (renomme de paper_portfolio_eu.py) charge ce fichier au demarrage.
#
# Champs obligatoires :
#   name, enabled, sharpe, trades, wf_status, edge_type,
#   market_hours (start, end, tz), tickers,
#   allocation_pct, max_position_pct, sl_pct, tp_pct
#
# Champs optionnels :
#   execution_broker — pour routage cross-broker (default: ibkr)
#   exchanges — mapping ticker -> (exchange, currency) pour IBKR
# =============================================================================

strategies:
  # ALLOCATIONS calibrees pour $10K IBKR live + levier 2x intraday
  # Min position $1000/ticker pour garder frais IBKR EU (min EUR 3) sous 16% du TP
  # Tickers reduits aux plus liquides pour minimiser slippage
  # Total EU alloc = 40% cash ($4K) → $8K notional avec levier 2x

  bce_momentum_drift:
    name: "BCE Momentum Drift v2"
    enabled: false  # Disabled: seulement 8 events/an, positions trop petites a $10K
    sharpe: 14.93
    trades: 99
    wf_status: "VALIDATED"
    edge_type: "event"
    market_hours: {start: "13:45", end: "17:30", tz: "Europe/Paris"}
    tickers: ["BNP.PA", "GLE.PA"]
    allocation_pct: 0.10
    max_position_pct: 0.10
    sl_pct: 0.015
    tp_pct: 0.03

  auto_sector_german:
    name: "Auto Sector German"
    enabled: false  # P1.4 audit 2026-04-18: WF officiel rejected, no .py runtime impl
    sharpe: 13.43
    trades: 97
    wf_status: "REJECTED_OOS_2026-03-31"  # was "VALIDATED" - corrected per output/wf_eu_results/wf_eu_summary.json
    edge_type: "event"
    market_hours: {start: "09:00", end: "17:30", tz: "Europe/Paris"}
    tickers: ["CON.DE", "SHA.DE"]  # 2 plus liquides (ZIL retire = trop petit)
    allocation_pct: 0.15
    max_position_pct: 0.15
    sl_pct: 0.02
    tp_pct: 0.035

  brent_lag_play:
    name: "Brent Lag Play"
    enabled: false  # P1.4 audit 2026-04-18: legacy spot equity, IBKR EU live impossible
    sharpe: 4.08
    trades: 729
    wf_status: "LEGACY_PAPER_VALIDATED_NOT_LIVE_READY"  # was VALIDATED - spot leverage unavailable
    edge_type: "momentum"
    market_hours: {start: "15:30", end: "20:00", tz: "Europe/Paris"}
    tickers: ["TTE.PA", "BP.L"]  # 2 plus liquides (SHEL retire)
    allocation_pct: 0.15
    max_position_pct: 0.15
    sl_pct: 0.015
    tp_pct: 0.025

  eu_close_us_afternoon:
    name: "EU Close -> US Afternoon"
    enabled: false  # Needs Alpaca live (cross-broker) — disabled until Alpaca funded
    sharpe: 2.43
    trades: 113
    wf_status: "VALIDATED"
    edge_type: "cross_timezone"
    market_hours: {start: "15:30", end: "21:00", tz: "Europe/Paris"}
    tickers: ["SPY", "QQQ"]
    execution_broker: "alpaca"
    allocation_pct: 0.10
    max_position_pct: 0.10
    sl_pct: 0.01
    tp_pct: 0.02

  eu_gap_open:
    name: "EU Gap Open"
    enabled: false  # P1.4 audit 2026-04-18: WF officiel REJECTED (Sharpe -0.11, commission burn 109%)
    sharpe: 8.56
    trades: 150
    wf_status: "REJECTED_OOS_2026-03-31"  # was VALIDATED - per output/wf_eu_results/wf_eu_summary.json
    edge_type: "gap"
    market_hours: {start: "09:05", end: "12:00", tz: "Europe/Paris"}
    tickers: ["SAP.DE", "ASML.AS"]  # 2 plus liquides (6 retires = positions trop petites)
    allocation_pct: 0.15
    max_position_pct: 0.15
    sl_pct: 0.01
