      correlation_drift: ">0.70"
    notes: |
      T1-A PROMOTE_LIVE in-sample (score +0.60, dSharpe +0.08). WF 4/5 OOS PASS,
      MC P(DD>30%) 28.3% (tres limite, a surveiller). Start paper: 2026-04-16.

  - strategy_id: mes_pre_holiday_long
