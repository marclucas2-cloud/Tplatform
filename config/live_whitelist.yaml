    sizing_policy: fixed_1_contract
    max_risk_usd: 300
    kill_criteria:
      drawdown_absolute: -10%
      drawdown_rolling_90d: -8%
      sharpe_rolling_60d: -0.5
      divergence_vs_backtest: "2x_std"
      correlation_drift: ">0.70"
    notes: |
      T1-A PROMOTE_LIVE in-sample (score +1.21, dSharpe +0.22). WF 3/5 OOS PASS,
      MC P(DD>30%) 9.8%. Session INT-A VALIDATED. Start date paper: 2026-04-16.
      Goto live_probation apres 30 jours sans divergence > 2 sigma.

