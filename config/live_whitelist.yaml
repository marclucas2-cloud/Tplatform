  version: 4
  updated_at: "2026-04-16"
  updated_by: "phase_3_1_audit_demotes"
  review_cadence: "hebdomadaire"
  notes: |
    v2 2026-04-16: +3 candidates ibkr_futures paper_only (INT-C).
    v3 2026-04-16: gold_trend_mgc -> paper_only (V1 recalibration SL/TP).
    v4 2026-04-16: Phase 3.1 audit demotes (3 strats binance_crypto
    live_probation -> paper_only): trend_short_btc, mr_scalp_btc,
    liquidation_spike. Cf docs/audit/strategy_by_strategy_audit.md.
    Portfolio live passe de 12 -> 9 strats (live + probation), plus defendable.

