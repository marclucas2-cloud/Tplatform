# =============================================================================
# LIVE WHITELIST CANONIQUE — source unique de verite
# =============================================================================
# Ce fichier est la source de verite unique pour les strategies autorisees
# a executer des ordres LIVE (vrai argent). Toute strategie qui n'est PAS
# dans cette whitelist est:
#   - soit en paper (pour apprentissage + data collection)
#   - soit desactivee
#
# Contrat:
#   - Le worker lit ce fichier au boot via load_live_whitelist()
#   - Avant tout ordre live, le worker verifie que strategy_id est whitelist
#   - Un signal hors whitelist est logged + bloque sans etre execute
#   - Les promotions live passent par edit de ce fichier + commit + redeploy
#
# Schema par entree:
#   strategy_id: identifiant canonique (doit matcher runtime_entrypoint)
#   book: ibkr_futures | ibkr_fx | ibkr_eu | binance_crypto | alpaca_us
#   status: live_core | live_probation | paper_only | disabled
#   runtime_entrypoint: ou le code tourne (worker.py:function ou module)
#   wf_source: fichier ou artefact avec le dernier walk-forward
#   sizing_policy: risk_budget | kelly_quarter | fixed
#   max_risk_usd: cap max worst-case par position ($)
#   kill_criteria: conditions de retrait automatique
#   notes: contexte libre
#
# Derniere MAJ: 2026-04-15 (P1.1 live hardening, 3 books gouvernables)
# =============================================================================

