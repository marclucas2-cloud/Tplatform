# =============================================================================
# LIVE WHITELIST CANONIQUE — source unique de verite
# =============================================================================
# Ce fichier est la source de verite unique pour les strategies autorisees
# a executer des ordres LIVE (vrai argent). Toute strategie qui n'est PAS
# dans cette whitelist est:
#   - soit en paper (pour apprentissage + data collection)
#   - soit desactivee
#
# Contrat:
#   - Le worker lit ce fichier au boot via load_live_whitelist()
#   - Avant tout ordre live, le worker verifie que strategy_id est whitelist
#   - Un signal hors whitelist est logged + bloque sans etre execute
#   - Les promotions live passent par edit de ce fichier + commit + redeploy
#
# Schema par entree:
#   strategy_id: identifiant canonique (doit matcher runtime_entrypoint)
#   book: ibkr_futures | ibkr_fx | ibkr_eu | binance_crypto | alpaca_us
#   status: live_core | live_probation | paper_only | disabled
#   runtime_entrypoint: ou le code tourne (worker.py:function ou module)
#   wf_source: fichier ou artefact avec le dernier walk-forward
#   sizing_policy: risk_budget | kelly_quarter | fixed
#   max_risk_usd: cap max worst-case par position ($)
#   kill_criteria: conditions de retrait automatique
#   notes: contexte libre
#
# Derniere MAJ: 2026-04-15 (P1.1 live hardening, 3 books gouvernables)
# =============================================================================

metadata:
  version: 3
  updated_at: "2026-04-16"
  updated_by: "gold_trend_mgc_recalibration_V1_option_B"
  review_cadence: "hebdomadaire"
  notes: |
    v2 2026-04-16: +3 candidates ibkr_futures paper_only (INT-C promotion
    committee). T1-A calendaires MES: monday_long_oc, wednesday_long_oc,
    pre_holiday_long.

    v3 2026-04-16: gold_trend_mgc downgrade live_core -> paper_only pour
    recalibration V1 (SL 0.4% / TP 0.8%, aligne deleveraging level_3 -1.8% NAV).
    Le trade live ouvert sous V0 (SL 1.5% TP 3%) reste actif pour ne pas
    casser le setup en cours; nouveaux signaux respecteront V1.
    Transition paper_only -> live_core apres WF + MC + 30j paper sans
    divergence > 2 sigma.

# -----------------------------------------------------------------------------
# IBKR FUTURES — 3 strats alpha pur validees 10Y + WF + MC
# -----------------------------------------------------------------------------
# Portefeuille V2 (first-refusal): CAGR 12.2%, Sharpe 0.87, DD -28.6%
# Monte Carlo: P(ruine)=0%, P(DD>-40%)=8.5%, longest DD median 530j
# Risk Budget Framework 5% equity deploye depuis le 15 avril 2026.
# -----------------------------------------------------------------------------

ibkr_futures:

  - strategy_id: cross_asset_momentum
    book: ibkr_futures
    status: live_core
    runtime_entrypoint: "worker.py:_run_futures_cycle (bloc STRATS LIVE CAPABLE)"
    runtime_module: "strategies_v2.futures.cross_asset_momentum.CrossAssetMomentum"
    wf_source: "scripts/wf_ib_portfolio.py (5 windows, 4/5 OOS profitable)"
    sizing_policy: "risk_budget_5pct"
    max_risk_usd: 500  # on $10K equity = 5% cap
    priority: "first_refusal"  # CAM a priorite sur ses symboles preferes
    universe: [MES, MNQ, M2K, MGC, MCL]
    holding_period_days: 20
    rebalance_cadence_days: 20
    min_momentum_pct: 0.02
    kill_criteria:
      - "5 consecutive losses"
      - "rolling 90d Sharpe < -0.5"
      - "DD depuis peak > 35%"
    notes: |
      Rotate meilleur de MES/MNQ/M2K/MGC/MCL sur 20d momentum.
      Backtest 10Y Sharpe 0.85, corr MES 0.003. First-refusal sur
      ses symboles preferes via cam_top_pick() (bloque gold_trend
      et gold_oil si CAM voudrait le meme symbole).

  - strategy_id: gold_trend_mgc
    book: ibkr_futures
    status: paper_only   # 2026-04-16 TRANSITION live_core -> paper_only pour V1 recalibration
    runtime_entrypoint: "worker.py:_run_futures_cycle (bloc STRATS LIVE CAPABLE)"
    runtime_module: "strategies_v2.futures.gold_trend_mgc.GoldTrendMGC"
    wf_source: "scripts/research/backtest_gold_trend_sl_variants.py + WF/MC pending (INT-A T1-A pattern)"
    sizing_policy: "risk_budget_5pct"
    max_risk_usd: 500
    priority: "secondary_to_cross_asset"
    universe: [MGC]
    ema_period: 20
    sl_pct: 0.004     # V1 Option B (2026-04-16): aligne deleveraging level_3 -1.8% NAV
    tp_pct: 0.008     # V1 Option B: R/R 2:1 maintenu
    max_hold_days: 10
    kill_criteria:
      - "5 consecutive losses"
      - "rolling 90d Sharpe < -0.5"
    notes: |
      Long MGC si close > EMA20. Capture les rallies gold co-occurents
      avec oil rally (spread faible -> gold_oil silencieux, gold_trend
      seul actif). Essentiel pour 2020 COVID, 2024.

      RECALIBRATION 2026-04-16 (V1 Option B):
      - Anciens defaults SL 1.5% TP 3% -> backtest +$26K Sharpe 0.73 mais
        en prod sabote par deleveraging level_3 -1.8% NAV (= MGC -0.4%) ->
        backtest emule +$11.7K MaxDD -32.7%.
      - Nouveaux defaults SL 0.4% TP 0.8% -> backtest +$23.8K Sharpe 1.58
        MaxDD -7.1% WR 47.6% sur 5Y MGC daily.
      - Status downgrade live_core -> paper_only en attente WF + MC.
      - Trade live ouvert 2026-04-16 17:54 UTC (parent SL 1.5% TP 3%) reste
        actif sous old params pour ne pas casser le setup en cours; nouveaux
        signaux V1 a partir du prochain cycle.
      - Cf docs/research/gold_trend_sl_recalibration.md.

  - strategy_id: gold_oil_rotation
    book: ibkr_futures
    status: live_core
    runtime_entrypoint: "worker.py:_run_futures_cycle (bloc STRATS LIVE CAPABLE)"
    runtime_module: "strategies_v2.futures.gold_oil_rotation.GoldOilRotation"
    wf_source: "scripts/wf_gold_oil_rotation.py (5/5 OOS profitable)"
    sizing_policy: "risk_budget_5pct"
    max_risk_usd: 500
    priority: "secondary_to_cross_asset"
    universe: [MGC, MCL]
    lookback_days: 20
    min_edge_pct: 0.02
    sl_pct: 0.02
    tp_pct: 0.04
    max_hold_days: 10
    cooldown_days: 10
    kill_criteria:
      - "5 consecutive losses"
      - "rolling 90d Sharpe < -0.5"
    notes: |
      Rotate long MGC vs MCL selon 20d momentum spread. Positive chaque
      annee 2021-2026 (backtest 5Y). Sharpe 6.44 solo, 0.87 en portefeuille
      (dilute par interactions avec gold_trend).

