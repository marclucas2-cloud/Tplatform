    description: "E-mini Nasdaq-100"
    exchange: CME
    multiplier: 20
    currency: USD
    tick_size: 0.25
    tick_value: 5.00
    months: HMUZ
    margin_initial: 17600
    margin_maintenance: 16000
    etf_proxy: QQQ
