# Risk limits specifiques futures
futures_risk:
  max_margin_per_position: 0.10     # 10% du capital par position
  max_total_futures_margin: 0.30    # 30% du capital total en futures
  max_capital_for_micro_only: 100000  # < $100K = micro uniquement
  min_capital_for_full_size: 100000   # >= $100K = full-size autorise
  roll_days_before_expiry: 5        # Roll 5 jours avant expiration

# Quarterly expiry calendar 2026 (3eme vendredi du mois d'expiration)
expiry_calendar_2026:
  H: "2026-03-20"    # Mars
  M: "2026-06-19"    # Juin
  U: "2026-09-18"    # Sept
  Z: "2026-12-18"    # Dec

# Monthly CL/MCL expiry calendar 2026
# (CL expire le 3eme jour ouvre avant le 25eme jour calendaire du mois precedent)
monthly_expiry_2026:
  F: "2025-12-19"    # Jan contract
  G: "2026-01-20"    # Feb
  H: "2026-02-20"    # Mar
  J: "2026-03-20"    # Apr
  K: "2026-04-21"    # May
  M: "2026-05-19"    # Jun
  N: "2026-06-22"    # Jul
  Q: "2026-07-21"    # Aug
  U: "2026-08-20"    # Sep
  V: "2026-09-22"    # Oct
  X: "2026-10-20"    # Nov
  Z: "2026-11-20"    # Dec
