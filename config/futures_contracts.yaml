# Contract specifications — Futures supportes
# Derniere mise a jour : 2026-03-27
#
# MICRO CONTRACTS UNIQUEMENT pour capital < $100K
# Full-size desactive par securite (multiplicateurs trop gros pour $25K)

micro_contracts:
  MES:
    description: "Micro E-mini S&P 500"
    exchange: CME
    multiplier: 5
    currency: USD
    tick_size: 0.25
    tick_value: 1.25
    months: HMUZ          # Mars, Juin, Sept, Dec
    trading_hours: "18:00-17:00 ET"  # Sun-Fri
    margin_initial: 1400
    margin_maintenance: 1200
    etf_proxy: SPY
    full_size_equivalent: ES
    point_value: 5.0      # 1 point = $5

  MNQ:
    description: "Micro E-mini Nasdaq-100"
    exchange: CME
    multiplier: 2
    currency: USD
    tick_size: 0.25
    tick_value: 0.50
    months: HMUZ
    trading_hours: "18:00-17:00 ET"
    margin_initial: 1800
    margin_maintenance: 1500
    etf_proxy: QQQ
    full_size_equivalent: NQ
    point_value: 2.0

  MCL:
    description: "Micro WTI Crude Oil"
    exchange: NYMEX
    multiplier: 100
    currency: USD
    tick_size: 0.01
    tick_value: 1.00
    months: all           # Tous les mois (FGHJKMNQUVXZ)
    trading_hours: "18:00-17:00 ET"
    margin_initial: 600
    margin_maintenance: 500
    etf_proxy: USO
    full_size_equivalent: CL
    point_value: 100.0

  MGC:
    description: "Micro Gold"
    exchange: COMEX
    multiplier: 10
    currency: USD
    tick_size: 0.10
    tick_value: 1.00
    months: GJMQVZ        # Feb, Avr, Juin, Aout, Oct, Dec
    trading_hours: "18:00-17:00 ET"
    margin_initial: 1000
    margin_maintenance: 850
    etf_proxy: GLD
    full_size_equivalent: GC
    point_value: 10.0

# Full-size — reference uniquement, INTERDIT pour trading $25K
