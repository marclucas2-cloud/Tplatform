# Allocation V5 — Multi-Asset Expansion (22 strategies, 4 asset classes)
# US 40% / EU 25% / FX 18% / Futures 10% / Cash 7%
# Derniere mise a jour : 2026-03-27

portfolio:
  target_gross_exposure: 0.85
  min_cash_reserve: 0.07
  max_single_bucket: 0.45
  max_single_broker: 0.60

buckets:
  us_intraday:
    target: 0.25
    broker: alpaca
    strategies: [dow_seasonal, corr_regime_hedge, vix_expansion_short, high_beta_short, late_day_mr, failed_rally, eod_sell_v2]
  us_event:
    target: 0.08
    broker: alpaca
    strategies: [fomc_reaction]
  us_daily:
    target: 0.07
    broker: alpaca
    strategies: [momentum_etf, pairs_mu_amat, vrp_regime]
  eu_intraday:
    target: 0.15
    broker: ibkr
    strategies: [eu_gap_open, brent_lag_play, eu_close_us_afternoon]
  eu_event:
    target: 0.10
    broker: ibkr
    strategies: [bce_momentum_drift, auto_sector_german, bce_press_conference]
  fx_swing:
    target: 0.18
    broker: ibkr
    strategies: [fx_eurusd_trend, fx_eurgbp_mr, fx_eurjpy_carry, fx_audjpy_carry, fx_gbpusd_trend, fx_usdchf_mr, fx_nzdusd_carry]
  futures_trend:
    target: 0.07
    broker: ibkr
    strategies: [futures_mes_trend, futures_mnq_mr]
  futures_energy:
    target: 0.03
    broker: ibkr
    strategies: [brent_lag_futures]

timezone_allocation:
  # CET hours
  "09:00-15:30": {eu_intraday: 0.25, eu_event: 0.10, fx_swing: 0.05}
  "15:30-17:30": {eu_intraday: 0.15, us_intraday: 0.25, us_event: 0.08, fx_swing: 0.05}
  "17:30-22:00": {us_intraday: 0.25, us_daily: 0.07, futures_trend: 0.07, fx_swing: 0.05}
  "22:00-09:00": {fx_swing: 0.15, futures_trend: 0.05}

regime_multipliers:
  BULL_NORMAL: {momentum: 1.0, mean_reversion: 1.0, short: 0.5, carry: 1.2, event: 0.8}
  BULL_HIGH_VOL: {momentum: 0.7, mean_reversion: 1.3, short: 0.8, carry: 0.8, event: 1.2}
  BEAR_NORMAL: {momentum: 0.6, mean_reversion: 0.8, short: 1.5, carry: 0.6, event: 1.0}
  BEAR_HIGH_VOL: {momentum: 0.3, mean_reversion: 0.5, short: 2.0, carry: 0.3, event: 1.5}

tiers:
  S: {max_alloc: 0.15, strategies: [eu_gap_open, bce_momentum_drift]}
  A: {max_alloc: 0.10, strategies: [brent_lag_play, dow_seasonal, fx_eurusd_trend, futures_mes_trend]}
  B: {max_alloc: 0.06, strategies: [corr_regime_hedge, vix_expansion_short, high_beta_short, auto_sector_german, fx_eurjpy_carry, fx_audjpy_carry]}
  C: {max_alloc: 0.04, strategies: [late_day_mr, failed_rally, eod_sell_v2, eu_close_us_afternoon, fx_eurgbp_mr, fx_gbpusd_trend, fx_usdchf_mr, fx_nzdusd_carry, futures_mnq_mr, brent_lag_futures, fomc_reaction, bce_press_conference]}
