# FX Live Sizing Configuration for $10K
# Updated: 2026-03-27

total_capital: 10000
fx_allocation_pct: 0.40  # $4,000 dedicated to FX
max_leverage: 20.0  # Month 1 FX leverage (conservative; IBKR allows up to 33x on majors)

# Sharpe-weighted allocation
strategies:
  fx_eurusd_trend:
    pair: EURUSD
    sharpe: 4.62
    weight: 0.35  # 35% of FX allocation
    notional_target: 30000
    margin_target: 900
    min_lot: 25000  # IBKR minimum
    order_type: LIMIT
    backtest_slippage_bps: 0.5

  fx_eurgbp_mr:
    pair: EURGBP
    sharpe: 3.65
    weight: 0.25
    notional_target: 25000
    margin_target: 750
    min_lot: 25000
    order_type: LIMIT
    backtest_slippage_bps: 0.7

  fx_eurjpy_carry:
    pair: EURJPY
    sharpe: 2.50
    weight: 0.22
    notional_target: 25000
    margin_target: 750
    min_lot: 25000
    order_type: LIMIT
    backtest_slippage_bps: 1.0

  fx_audjpy_carry:
    pair: AUDJPY
    sharpe: 1.58
    weight: 0.18
    notional_target: 20000
    margin_target: 600
    min_lot: 25000
    order_type: LIMIT
    backtest_slippage_bps: 1.2

# Spread filter thresholds
spread_filter:
  max_spread_ratio: 2.0  # Reject if spread > 2x average
  average_spreads_bps:
    EURUSD: 0.8
    EURGBP: 1.2
    EURJPY: 1.5
    AUDJPY: 2.0

  fx_carry_momentum_filter:
    pairs: [AUDJPY, USDJPY, EURJPY, NZDUSD]
    sharpe: 2.17  # WF OOS, MC P5 1.41
    weight: 0.15  # Probationary (30 days signal-only)
    notional_target: 1500  # Per pair, $10K * 15% / 4
    margin_target: 450
    min_lot: 1000  # Odd-lot FX
    order_type: MARKET
    backtest_slippage_bps: 1.0
    status: PROBATIONARY  # Promote to 0.30 after 30 days

# Total margin usage
# Sum of margin targets: $3,450 / $10,000 = 34.5%
