# =============================================================================
# RISK REGISTRY CANONIQUE — budgets et limites consolides
# =============================================================================
# Phase 1.3 du plan TODO XXL DESK PERSO 10/10.
#
# Centralise tous les budgets de risque (par book + par strategie + global).
# Resoud le conflit C1 (kill switch thresholds dispersees) et C5 (allocation
# crypto fragmentee).
#
# Ce registre est consulte par:
#   - core/governance/pre_order_guard.py (verification avant ordre)
#   - core/governance/registry_loader.py (loader unique)
#   - worker.py cycles (sizing decisions)
#   - dashboard (affichage budget restant)
# =============================================================================

metadata:
  version: 1
  updated_at: "2026-04-16"
  notes: "v1 initial consolidant config/limits_live.yaml + state files."

# -----------------------------------------------------------------------------
# Budgets PORTFOLIO global (cross-book)
# -----------------------------------------------------------------------------

global:
  daily_loss_pct_global: 0.04          # -4% NAV consolide -> halt all trading
  weekly_loss_pct_global: 0.06         # -6% NAV consolide -> halt + review
  monthly_loss_pct_global: 0.10        # -10% NAV consolide -> halt + post-mortem
  max_concurrent_positions: 20         # cross-book
  max_correlation_pairwise: 0.70       # entre strats live (post-Phase 7)

# -----------------------------------------------------------------------------
# Budgets par BOOK
# -----------------------------------------------------------------------------

books:

  binance_crypto:
    daily_loss_pct: 0.05               # cf data/kill_switch_state.json (override)
    weekly_loss_pct: 0.08
    monthly_loss_pct: 0.12
    max_position_pct: 0.15              # % equity book
    max_strategy_pct: 0.25
    max_gross_exposure_pct: 0.80       # long
    max_short_exposure_pct: 0.40
    max_earn_pct: 1.00                 # earn passif peut representer 100% (post P0 fix denominator)
    min_cash_reserve_pct: 0.10
    deleveraging:
      level_1_dd_pct: null             # crypto pas de deleveraging level (kill switch direct)
      level_3_dd_pct: 0.05             # = daily kill switch

  ibkr_futures:
    daily_loss_pct: 0.015              # cf config/limits_live.yaml circuit_breakers
    weekly_loss_pct: 0.03
    monthly_loss_pct: 0.05
    max_position_pct: 0.20
    max_strategy_pct: 0.30
    max_gross_pct: 1.30                # incl margin
    max_long_pct: 0.70
    max_short_pct: 0.40
    max_futures_contracts: 4           # cross-strat hard cap
    max_risk_per_strat_usd: 500
    deleveraging:
      level_1_dd_pct: 0.009            # -0.9% NAV -> reduce 30%
      level_2_dd_pct: 0.0135           # -1.35% NAV -> reduce 50%
      level_3_dd_pct: 0.018            # -1.8% NAV -> close all
    margin_limits:
      max_margin_used_pct: 0.70        # alerte
      block_margin_pct: 0.85
    # Fix proposed (post-V1 gold_trend_mgc paper validation):
    # bumper level_1_dd_pct 0.009 -> 0.012 pour donner marge V1 SL 0.4%

  ibkr_eu:
    paper_only_note: "Pas de risk budget actif (paper_only). Reactivation conditionnelle."

  ibkr_fx:
    disabled_note: "ESMA, pas de risk budget actif."

  alpaca_us:
    paper_only_note: "Pas de risk budget actif (paper_only). Capital paper $100K."
    max_position_pct: 0.10              # 10% par symbol
    max_strategy_pct: 0.30
    max_gross_pct: 1.20

# -----------------------------------------------------------------------------
# Budgets par STRATEGIE (live uniquement)
# -----------------------------------------------------------------------------

strategies:

  cross_asset_momentum:
    book: ibkr_futures
    max_risk_usd: 500
    max_drawdown_strat_pct: 0.05       # -5% sur capital alloue
    sizing_policy: "risk_budget_5pct"
    kill_criteria:
      consecutive_losses: 5
      rolling_90d_sharpe_min: -0.5

  gold_oil_rotation:
    book: ibkr_futures
    max_risk_usd: 500
    max_drawdown_strat_pct: 0.05
    sizing_policy: "risk_budget_5pct"
    kill_criteria:
      consecutive_losses: 5
      rolling_90d_sharpe_min: -0.5

  # gold_trend_mgc en paper_only depuis 2026-04-16 (V1 recalibration)
  # Pas de budget live tant que pas re-promote.

  btc_eth_dual_momentum:
    book: binance_crypto
    max_risk_usd: 200                  # ~2% Binance equity
    max_drawdown_strat_pct: 0.10
    sizing_policy: "allocation_pct_x_kelly_quarter"
    kill_criteria:
      consecutive_losses: 5
      rolling_90d_sharpe_min: -0.5

  volatility_breakout:
    book: binance_crypto
    max_risk_usd: 200
    max_drawdown_strat_pct: 0.10
    sizing_policy: "allocation_pct_x_kelly_quarter"
    kill_criteria:
      consecutive_losses: 5
      rolling_90d_sharpe_min: -0.5

  # Probation strats: budgets reduits, kill_criteria plus stricts
  liquidation_momentum:
    book: binance_crypto
    status: live_probation
    max_risk_usd: 100                  # 50% de live_core
    max_drawdown_strat_pct: 0.05       # plus strict
    sizing_policy: "allocation_pct_x_kelly_quarter"
    kill_criteria:
      consecutive_losses: 4
      rolling_30d_sharpe_min: -0.3

# -----------------------------------------------------------------------------
# Default kill_criteria (applies if not overriden per strat)
# -----------------------------------------------------------------------------

defaults:
  kill_criteria:
    consecutive_losses: 7
    rolling_90d_sharpe_min: -1.0
    drawdown_absolute_pct: -0.20       # -20% perte cumulee
    correlation_drift_threshold: 0.80
    divergence_vs_backtest_sigma: 2.5
