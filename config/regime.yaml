# Regime Engine Configuration — V12 D1
# Seuils deterministes, pas de ML

thresholds:
  trend_adx_min: 25.0
  trend_vol_ratio_max: 1.5
  mr_adx_max: 20.0
  mr_vol_ratio_max: 1.2
  highvol_vol_ratio_min: 2.0
  highvol_corr_rising_min: 0.1
  panic_vol_ratio_min: 3.0
  panic_corr_min: 0.8
  panic_spread_zscore_min: 2.5
  lowliq_spread_zscore_min: 2.0
  lowliq_volume_ratio_max: 0.5
  hysteresis_periods: 2

# Regime cycle interval in worker (seconds)
cycle_interval: 900  # 15 minutes

# Strategy activation matrix: strategy_id -> {regime -> multiplier 0.0-1.0}
# 0.0 = OFF, 0.5 = half sizing, 1.0 = nominal
activation_matrix:
  # FX strategies — PANIC = 0 (protect carry from crashes)
  fx_carry_vol_scaled:
    TREND_STRONG: 1.0
    MEAN_REVERT: 1.0
    HIGH_VOL: 0.5
    PANIC: 0.0
    LOW_LIQUIDITY: 0.3
    UNKNOWN: 0.8  # Fix #6: UNKNOWN = prudent, pas arrete
  fx_carry_momentum:
    TREND_STRONG: 1.0
    MEAN_REVERT: 0.8
    HIGH_VOL: 0.3
    PANIC: 0.0
    LOW_LIQUIDITY: 0.3
    UNKNOWN: 0.8

