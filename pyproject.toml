[tool.ruff]
target-version = "py312"
line-length = 100
src = ["core", "strategies_v2", "dashboard", "scripts", "tests"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",   # line too long — handled by line-length
    "B008",   # function call in default argument — frequent false positives
    "E402",   # module level import not at top — needed for sys.path inserts
    "F401",   # unused imports — will handle in C4-02 separately
    "E722",   # bare except — too many to fix at once
    "B905",   # zip without strict — not critical
    "UP035",  # typing deprecations — too noisy for now
    "UP006",  # use type instead of Type — too noisy
]

[tool.ruff.lint.isort]
known-first-party = ["core", "strategies_v2", "dashboard"]

[tool.ruff.lint.per-file-ignores]
"archive/*" = ["ALL"]
"tests/*" = ["E", "W", "B", "SIM"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
# P2.3 live hardening: hermetic tests — exclude worktrees, caches, temp
# to prevent accidentally running stale tests from .claude/worktrees or
# picking up locally cached data from previous runs.
norecursedirs = [
    ".claude",
    ".claude/worktrees",
    "temp",
    "archive",
    ".venv",
    "venv",
    "__pycache__",
    ".pytest_cache",
    ".pytest_tmp",
    "build",
    "dist",
    "node_modules",
    "dashboard/frontend/node_modules",
    "dashboard/frontend/dist",
]
addopts = "-ra --strict-markers"
filterwarnings = [
    "ignore::DeprecationWarning:websockets.*",
    "ignore::DeprecationWarning:alpaca_trade_api.*",
    "ignore::DeprecationWarning:binance.*",
    "ignore::DeprecationWarning:pkg_resources.*",
    "ignore::DeprecationWarning:google.*",
    "ignore:datetime\\.datetime\\.utcnow:DeprecationWarning",
    "ignore:datetime\\.datetime\\.utcfromtimestamp:DeprecationWarning",
]
